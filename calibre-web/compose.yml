---
services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/wasituf/.config/calibre:/config
      - /media/calibre/library:/books
    ports:
      - 8083:8083
    restart: unless-stopped
